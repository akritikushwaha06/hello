<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
    }

    /* LEFT SIDE */
    .left {
      width: 50%;
      background: linear-gradient(135deg, #1f3c88, #1b2735);
      color: white;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .left p {
      font-size: 22px;
      color: #ccc;
    }

    /* RIGHT SIDE */
    .right {
      width: 50%;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px;
      color: white;
    }

    .top-content {
      text-align: center;
      margin-top: 80px;
    }

    .top-content h2 {
      font-size: 30px;
      margin-bottom: 20px;
    }

    

    /* BUTTONS */
    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 10px;
    }

    .btn {
      padding: 10px 25px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .try {
      margin-top: 15px;
      color: #aaa;
      font-size: 14px;
    }

    /* BOTTOM SECTION */
    .bottom {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-img {
      width: 70px;
      margin-bottom: 10px;
    }

    .footer {
      font-size: 12px;
      color: #888;
    }

    .footer a {
      color: #888;
      text-decoration: none;
      margin: 0 5px;
    }

  </style>
</head>

<body>

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Plan a trip</h1>
    <p>to experience Seoul like a local</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <!-- TOP CONTENT -->
    <div class="top-content">
      <h2>Get started</h2>

      

      <div class="buttons">
        <button class="btn">Log in</button>
        <button class="btn">Sign up</button>
      </div>

      <div class="try">Try it first</div>
    </div>

    <!-- BOTTOM (LOGO + TERMS) -->
    <div class="bottom">
      <img src="https://rabbitlogo.com/wp-content/uploads/2025/10/chatgpt-logo.jpg" class="logo-img" alt="ChatGPT Logo">

      <div class="footer">
        <a href="#">Terms of use</a> |
        <a href="#">Privacy policy</a>
      </div>
    </div>

  </div>

</body>
</html>
