<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatGPT Login Clone</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
}

/* LEFT SIDE */
.left {
  width: 60%;
  background: linear-gradient(160deg, #1f3c88, #1b2a49);
  color: white;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo-text {
  position: absolute;
  top: 25px;
  left: 40px;
  font-size: 20px;
  font-weight: 600;
  color: #b880e5;
}

.left h1 {
  font-size: 32px;
  margin-bottom: 10px;
  color: #b880e5;
}

.left p {
  font-size: 22px;
  color: #b880e5;
}

/* RIGHT SIDE */
.right {
  width: 40%;
  background: #0f0f0f;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* CENTER CONTENT */
.center-box {
  text-align: center;
  margin-bottom: 120px;
}

.center-box h2 {
  font-size: 28px;
  color: white;
  margin-bottom: 25px;
  
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

.btn {
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  font-size: 12px;
  color: white;
  cursor: pointer;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
}

.btn:hover {
  opacity: 0.85;
}

.try {
  margin-top: 15px;
  font-size: 13px;
  color: white;
}

/* BOTTOM SECTION */
.bottom {
  position: absolute;
  bottom: 30px;
  text-align: center;
}

.bottom img {
  width: 55px;
  margin-bottom: 8px;
  opacity: 0.9;
}

.footer {
  font-size: 12px;
  color: #888;
}

.footer a {
  color: #888;
  text-decoration: none;
  margin: 0 5px;
}
</style>

</head>

<body>

<div class="logo-text">ChatGPT</div>

<!-- LEFT -->
<div class="left">
  <h1>Plan a trip</h1>
  <p>to experience Seoul like a local</p>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="center-box">
    <h2>Get started</h2>

    <div class="buttons">
      <button class="btn">Log in</button>
      <button class="btn">Sign up for free</button>
    </div>

    <div class="try">Try it first</div>
  </div>

  <!-- LOGO + TERMS -->
  <div class="bottom">
    <img src="https://rabbitlogo.com/wp-content/uploads/2025/10/chatgpt-logo.jpg" alt="logo">
    <div class="footer">
      <a href="#">Terms of use</a> |
      <a href="#">Privacy policy</a>
    </div>
  </div>

</div>

</body>
</html>
