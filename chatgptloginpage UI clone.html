<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatGPT Login Clone</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
}

/* LEFT SIDE */
.left {
  width: 60%;
  background: #00002e;
  color: white;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo-text {
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 16px;
  font-weight: 600;
  color: #b880e5;
  height: 62px;
  width: 357px;
  
  display: block;
  margin: 0px;
  padding: 0px;
}

.left h1 {
  font-size: 28px;
  margin-bottom: 5px;
  color: #b880e5;
}

.left p {
  font-size: 22px;
  color: #b880e5;
}

/* RIGHT SIDE */
.right {
  width: 40%;
  background: #000000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  
}

/* CENTER CONTENT */
.center-box {
  text-align: center;
  margin-bottom: 120px;
}

.center-box h2 {
  font-size: 20px;
  color: white;
  margin-bottom: 10px;
  padding-right: 70px;
 
  
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  border-width: 1px;
  font: inherit;
  min-width: 60px;
  
  
}

.btn {
  padding: 6px 65px;
  border-radius: 30px;
  border: none;
  font-size: 10px;
  color: white;
  cursor: pointer;
  background: #0066de;
  padding-left: 40px;
  padding-right: 40px;
  min-width: 80px;

}

.btn:hover {
  opacity: 0.85;
}

.try {
  margin-top: 15px;
  font-size: 9px;
  color: white;
  padding-right: 70px;
  
}

/* BOTTOM SECTION */
.bottom {
  position: absolute;
  bottom: 30px;
  text-align: center;
}

.bottom img {
  width: 55px;
  margin-bottom: 0px;
  opacity: 0.9;
  width: 36px;
  height: 24px;

}

.footer {
  font-size: 8px;
  color: #afafaf;
 
}

.footer a {
  color: #afafaf;
  text-decoration: none;
  margin: 0 5px;
   text-decoration: underline;
}

.formbox{
width: 250px;

}


</style>

</head>

<body>

<div class="logo-text">ChatGPT</div>

<!-- LEFT -->
<div class="left">
  <h1>Plan a trip</h1>
  <p>to experience Seoul like a local</p>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="center-box">
    <h2 style="padding-right: 0px;" >Get started</h2>

    <div class="buttons">
      <button style="width: 140px;" class="btn">Log in</button>
      <button style="width: 140px; padding: 0px;" class="btn">Sign up for free</button>
    </div>

    <div class="try" style="padding-right: 0px;"><a> Try it first</a></div>
  </div>

  <!-- LOGO + TERMS -->
  <div class="bottom">
    <img src="https://rabbitlogo.com/wp-content/uploads/2025/10/chatgpt-logo.jpg" alt="logo">
    <div class="footer">
      <a href="#">Terms of use</a> |
      <a href="#">Privacy policy</a>
    </div>
  </div>

</div>

</body>
</html>
